<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HANDSHAKE - text → dial-up</title>
<style>
  /* The Ultimate Oldschool PC Font Pack - Web437 IBM VGA 8x16 (VileR, CC BY-SA 4.0) */
  @font-face{ font-family:'IBM VGA'; src:url('Web437_IBM_VGA_8x16.woff') format('woff'); font-display:swap; }
  :root{ --blue:#0000aa; --cyan:#55ffff; --mcyan:#00aaaa; --yel:#ffff55; --red:#ff5555; --dim:#3366cc; }
  *{box-sizing:border-box; margin:0; padding:0;}
  input,textarea,button,select{-webkit-appearance:none; appearance:none; border-radius:0;
    -webkit-tap-highlight-color:transparent;}
  html,body{background:var(--blue); color:var(--cyan);
    font:16px/1.15 'IBM VGA',ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
  body{max-width:680px; margin:0 auto; padding:0 8px 80px; overflow-x:hidden;}

  .menu{display:flex; gap:12px; padding:1px 8px; background:#a8a8a8; color:#000;}
  .menu b{color:var(--red); font-weight:400;}
  .menu span{cursor:pointer; padding:0 4px; user-select:none;}
  .menu span:active, .menu span:hover{background:var(--cyan); color:#000;}
  .menu .grow, .menu .tclk{cursor:default; background:none;}
  .menu .tclk, .menu .tclk:hover{color:#000; background:none;}
  .grow{flex:1;}

  fieldset{border:3px double var(--cyan); padding:8px; margin-top:10px;}
  legend{margin:0 auto; background:var(--mcyan); color:#000; padding:0 10px;}

  .scope{position:relative;}
  canvas{display:block; width:100%; height:200px;}
  .khz{position:absolute; right:5px; top:4px; font-size:11px; color:var(--dim);}

  .subs{border-top:1px solid var(--cyan); margin-top:6px; padding:6px 2px 0;
    min-height:42px; color:var(--yel);}
  .subs .who{color:#fff; margin-right:6px;}
  .subs .cur{display:inline-block; width:8px; height:13px; background:var(--yel);
    vertical-align:-2px; animation:bl 1s steps(1) infinite;}
  @keyframes bl{50%{opacity:0}}
  @media (prefers-reduced-motion:reduce){.subs .cur,.ccur{animation:none}}

  textarea{display:block; width:100%; background:var(--blue); color:var(--yel);
    border:1px solid var(--cyan); padding:6px 8px; font:inherit; font-size:16px;
    min-height:78px; resize:none; caret-color:var(--yel);}
  textarea::placeholder{color:var(--dim);}
  textarea:focus{outline:none; border-color:#fff;}

  .row{display:flex; gap:10px; align-items:center; margin-top:10px; flex-wrap:wrap;}

  .krow{margin-top:10px; gap:8px;}
  .krow label{color:var(--yel);}
  .kin{flex:1; min-width:0; background:var(--blue); color:var(--yel);
    border:1px solid var(--cyan); padding:5px 6px; font:inherit; font-size:16px;}
  .kin:focus{outline:none; border-color:#fff;}

  .frow{margin-top:10px; gap:6px; flex-wrap:wrap;}
  .fbtn{background:var(--mcyan); color:#000; border:none; font:inherit;
    padding:5px 10px; cursor:pointer;}
  .fbtn:hover, .fbtn:focus-visible{background:var(--cyan); outline:none;}
  .fbtn:disabled{background:#006666; color:#004444; cursor:default;}

  .feed{height:150px; overflow-y:auto; border:1px solid var(--cyan);
    margin-top:10px; background:var(--blue); padding:2px;}
  .feed .csys{color:var(--mcyan); padding:4px 6px;}
  .fi{display:block; width:100%; text-align:left; background:none; border:none;
    border-bottom:1px solid #001877; color:var(--cyan); font:inherit;
    padding:5px 6px; cursor:pointer;}
  .fi:hover, .fi:focus-visible{background:#001a9c; outline:none;}
  .fi.playing{background:#001a9c;}
  .fi .ct{color:var(--dim);} .fi .pl{color:var(--mcyan); margin-left:6px;}
  .fi .ch{margin:0 4px;} .fi .me{color:#fff;}
  .fi .nd{color:var(--yel); margin-left:6px;}
  .fi.read{opacity:.7;} .fi.read .nd{display:none;}
  @keyframes fli{from{background:var(--mcyan)} to{background:transparent}}
  .fi.flash{animation:fli 1s ease-out;}
  .hrow{margin-top:8px; gap:8px; align-items:center;}
  .hrow label{color:#fff;}

  .lvl[hidden], [hidden]{display:none;}
  .big{display:block; width:100%; background:var(--mcyan); color:#000; border:none;
    font:inherit; font-size:16px; padding:10px; cursor:pointer;}
  .big:hover, .big:focus-visible{background:var(--cyan); outline:none;}
  .hint{color:var(--dim); text-align:center; margin-top:6px;}

  .bottom{position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:680px; background:var(--blue); padding:0 4px;}
  .cmd{display:flex; align-items:center; gap:6px; color:#fff; padding:2px 4px;}
  .ccur{display:inline-block; width:8px; height:13px; background:#fff;
    animation:bl 1s steps(1) infinite;}
  .led{color:var(--dim); padding:0 2px;}
  .led i{display:none;}
  .led.on{background:var(--cyan); color:#000;}
  .led.hot{background:var(--red); color:#000;}
  .sep{color:var(--dim);}

  .fkeys{display:flex; gap:6px; padding:2px 0 5px;}
  .fk{flex:1; background:var(--mcyan); color:#000; border:none; font:inherit;
    padding:1px 3px; text-align:left; cursor:pointer; white-space:nowrap;}
  .fk b{background:#000; color:#fff; font-weight:400; padding:0 2px; margin-right:1px;}
  .fk:hover:not(:disabled), .fk:focus-visible{background:var(--cyan); outline:none;}
  .fk:disabled{background:#006666; color:#004444; cursor:default;}

  /* narrow screens: keep the menu + status bars on one line, no overflow */
  @media (max-width:480px){
    .menu{gap:6px;}
    .menu .tclk{display:none;}
    .cmd{gap:3px; font-size:13px;}
    .cmd .prompt{display:none;}
    .led{padding:0 1px;}
  }
</style>
</head>
<body>
<div class="menu">
  <span id="mHelp"><b>H</b>elp</span>
  <span class="grow"></span><span class="tclk" id="tclk">00:00</span>
</div>

<fieldset><legend>C:\TERMINAL</legend>
  <div class="scope">
    <canvas id="spec"></canvas>
    <div class="khz">0-4 kHz</div>
  </div>
  <div class="subs" id="subs"><span class="who">LINE:</span>OFFLINE - tap CONNECT to dial in.</div>
</fieldset>

<fieldset id="secret"><legend>C:\SECRET</legend>
  <div class="lvl" id="vConnect">
    <button class="big" id="connectBtn" type="button">► CONNECT</button>
    <div class="hint">dial in to begin</div>
  </div>
  <div class="lvl" id="vCompose" hidden>
    <div class="row krow">
      <input id="msgIn" class="kin" maxlength="500" placeholder="type your secret" aria-label="message to transmit">
      <button class="fbtn" id="txBtn2" type="button">► TRANSMIT</button>
    </div>
  </div>
  <div class="lvl" id="vKey" hidden>
    <div class="row krow">
      <input id="keyIn" class="kin" maxlength="80" placeholder="paste a handshake code" aria-label="handshake code">
      <button class="fbtn" id="listenBtn" type="button">► LISTEN</button>
    </div>
  </div>
  <div class="lvl" id="vThread" hidden>
    <div class="row frow">
      <button class="fbtn" id="saveKey" type="button">► SAVE HANDSHAKE</button>
      <button class="fbtn" id="copyKey" type="button">COPY CODE</button>
    </div>
    <div class="row hrow">
      <label for="handleIn">YOU:</label>
      <input id="handleIn" class="kin" maxlength="16" placeholder="your name" aria-label="your name">
    </div>
    <div class="row krow">
      <input id="replyIn" class="kin" maxlength="500" placeholder="type your secret" aria-label="reply">
      <button class="fbtn" id="txBtn3" type="button">► TRANSMIT</button>
    </div>
    <div class="row frow">
      <button class="fbtn" id="playAll" type="button">► PLAY ALL</button>
      <button class="fbtn" id="stopAll" type="button">■ STOP</button>
      <button class="fbtn" id="refreshBtn" type="button">REFRESH</button>
    </div>
    <div class="feed" id="feed"></div>
  </div>
  <input id="clipIn" type="file" accept="video/*,audio/*" hidden>
</fieldset>

<div class="bottom">
  <div class="cmd"><span class="prompt">C:\HANDSHAKE></span><span class="ccur">&nbsp;</span>
    <span class="grow"></span>
    <span class="led" id="ledOH"><i></i>OH</span><span class="led" id="ledCD"><i></i>CD</span><span class="led" id="ledRD"><i></i>RD</span><span class="led" id="ledSD"><i></i>SD</span>
    <span class="sep">│</span><span id="lnk">OFFLINE</span>&nbsp;<span id="clk">00:00</span>
  </div>
  <div class="fkeys">
    <button class="fk" id="bTx"><b>1</b>Transmit</button>
    <button class="fk" id="bHand"><b>2</b>Handshake</button>
    <button class="fk" id="bKey"><b>3</b>Key</button>
    <button class="fk" id="bQuit"><b>10</b>Quit</button>
  </div>
</div>

<script>
const SR = 44100;
const enc = new TextEncoder();
let actx = null, analyser = null, freq = null;
let events = [], charTimes = [], totalDur = 0, playT0 = 0, playing = false, playKind = 'boot';
let connected = false, connectedAt = 0;
let boot = null, help = null, playText = '';
let curSrc = null, queue = [];   // queue drives PLAY ALL of a key's thread

/* ---------- synthesis ---------- */
function env(a, n){
  const e = Math.min(132, n>>2);
  for(let i=0;i<e;i++){ a[i]*=i/e; a[n-1-i]*=i/e; }
  return a;
}
function tone(dur, freqs, amp){
  const n = Math.round(dur*SR), out = new Float32Array(n);
  const ph = freqs.map(()=>0);
  for(let i=0;i<n;i++){
    let s = 0;
    for(let k=0;k<freqs.length;k++){ ph[k]+=2*Math.PI*freqs[k]/SR; s+=Math.sin(ph[k]); }
    out[i] = s*amp/freqs.length;
  }
  return env(out, n);
}
function silence(dur){ return new Float32Array(Math.round(dur*SR)); }
function ansam(dur){
  const n = Math.round(dur*SR), out = new Float32Array(n);
  let ph = 0, sign = 1;
  for(let i=0;i<n;i++){
    if(i>0 && i % Math.round(0.45*SR) === 0) sign = -sign;
    ph += 2*Math.PI*2100/SR;
    out[i] = sign*Math.sin(ph)*0.4*(1+0.22*Math.sin(2*Math.PI*15*i/SR));
  }
  return env(out, n);
}
function fsk(bits, baud, fM, fS, amp){
  const spb = SR/baud, n = Math.round(bits.length*spb), out = new Float32Array(n);
  let ph = 0;
  for(let i=0;i<n;i++){
    const f = bits[Math.min(bits.length-1, (i/spb)|0)] ? fM : fS;
    ph += 2*Math.PI*f/SR;
    out[i] = Math.sin(ph)*amp;
  }
  return env(out, n);
}
function sweep(dur, f0, f1, amp){
  const n = Math.round(dur*SR), out = new Float32Array(n);
  let ph = 0;
  for(let i=0;i<n;i++){
    ph += 2*Math.PI*(f0+(f1-f0)*i/n)/SR;
    out[i] = Math.sin(ph)*amp;
  }
  return env(out, n);
}
function noise(dur, amp){
  const n = Math.round(dur*SR), out = new Float32Array(n);
  let p = 0;
  for(let i=0;i<n;i++){ p = (Math.random()*2-1 + p*1.6)/2.6; out[i] = p*amp*2.2; }
  return env(out, n);
}
function bong(dur, f1, f2, amp){
  const n = Math.round(dur*SR), out = new Float32Array(n);
  let p1=0, p2=0;
  for(let i=0;i<n;i++){
    p1+=2*Math.PI*f1/SR; p2+=2*Math.PI*f2/SR;
    out[i]=(Math.sin(p1)+Math.sin(p2))*0.5*amp*Math.exp(-3.2*i/n);
  }
  return out;
}
function psk(bits, baud, f, amp){
  const spb = SR/baud, n = Math.round(bits.length*spb), out = new Float32Array(n);
  let ph = 0, last = -1, sign = 1;
  for(let i=0;i<n;i++){
    const k = Math.min(bits.length-1, (i/spb)|0);
    if(k !== last){ if(bits[k]===0) sign = -sign; last = k; }
    ph += 2*Math.PI*f/SR;
    out[i] = Math.sin(ph)*sign*amp;
  }
  return env(out, n);
}
let seed = 7;
function rbit(){ seed = (seed*1103515245+12345)>>>0; return (seed>>16)&1; }
function rbits(k){ const a=[]; for(let i=0;i<k;i++) a.push(rbit()); return a; }
const DTMF_ROW=[697,770,852,941], DTMF_COL=[1209,1336,1477,1633];
const DTMF = {};
'123A456B789C*0#D'.split('').forEach((d,i)=>DTMF[d]=[DTMF_ROW[(i/4)|0], DTMF_COL[i%4]]);

function byteBits(b){
  const a = [0];
  for(let i=0;i<8;i++) a.push((b>>i)&1);
  a.push(1);
  return a;
}
function lineize(x){ // copper line: bandpass 250-3400, saturation, hiss, hum, crackle
  let lp=0, dc=0, h=0, c=0, ph50=0;
  for(let i=0;i<x.length;i++){
    lp += 0.384*(x[i]-lp);
    dc += 0.035*(lp-dc);
    let s = Math.tanh((lp-dc)*1.7)*0.82;
    h += 0.3*((Math.random()*2-1)-h);
    if(Math.random()<0.00001) c = 0.4+Math.random()*0.3;
    c *= 0.93;
    ph50 += 2*Math.PI*50/SR;
    s += h*0.035 + Math.sin(ph50)*0.004 + c*(Math.random()*2-1);
    x[i] = Math.max(-1, Math.min(1, s));
  }
  return x;
}
// per-char pitch: a pentatonic scale across the phone band so different
// letters sing at different pitches -> different words sound different.
// Deterministic (pure function of the char), per the "shareable signature" rule.
const NOTES = [392,440,523,587,659,784,880,1046,1175,1318,1568,1760,2093];
function pitch(c){ return NOTES[c % NOTES.length]; }
function richChar(ch, wordN, spd){
  if(ch === ' ')
    return (wordN % 13 === 0) ? sweep(0.16/spd, 2400, 600, 0.3) : tone(0.09/spd, [1270], 0.28);
  if('.!?'.includes(ch)) return bong(0.42/Math.sqrt(spd), 850, 1633, 0.55);
  if(',;:'.includes(ch)) return noise(0.06/spd, 0.3);
  if(DTMF[ch]) return tone(0.09/spd, DTMF[ch], 0.5);
  const bits = [];
  for(const b of enc.encode(ch)) bits.push(...byteBits(b));
  const c = ch.codePointAt(0), f = pitch(c);
  switch(c % 4){
    case 0: return fsk(bits, 300*spd, f, f*0.84, 0.45);
    case 1: return fsk(bits, 600*spd, f*1.06, f*0.92, 0.45);
    case 2: return fsk([...bits, ...bits, ...bits], 1200*spd, f*1.18, f*0.8, 0.45);
    default: return psk(bits, 600*spd, f, 0.45);
  }
}

function synth(mode, text, spd, label){
  label = label || 'TX';
  const chunks = [], ev = [], ct = [];
  let t = 0;
  const add = s=>{ chunks.push(s); t += s.length/SR; };
  const sub = (who, txt)=>ev.push({t, who, txt});

  if(mode === 'boot'){
    sub('NET','dialing 1-9-9-8...');
    for(const d of '1998'){ add(tone(0.13, DTMF[d], 0.55)); add(silence(0.07)); }
    add(silence(0.35));
    sub('NET','ringing...');
    add(tone(1.0,[440,480],0.22)); add(silence(0.4));
    sub('ANSWER','modem here. network - kill your echo suppressors.');
    add(ansam(2.3)); add(silence(0.25));
    sub('CALLER','i speak V.90, V.34, V.32bis...');
    add(fsk(rbits(220), 300, 1180, 980, 0.48)); add(silence(0.18));
    sub('ANSWER','V.90. let\'s go.');
    add(fsk(rbits(150), 300, 1850, 1650, 0.48)); add(silence(0.25));
    sub('BOTH','probing the line - which frequencies survive this copper?');
    add(bong(0.45, 850, 1633, 0.6)); add(silence(0.12));
    add(bong(0.45, 850, 1633, 0.6)); add(silence(0.15));
    add(tone(0.55,[150,750,1350,1950,2550,3150],0.6));
    add(sweep(0.6, 300, 3200, 0.4)); add(silence(0.2));
    sub('BOTH','training equalizers on known garbage...');
    add(noise(1.3, 0.33)); add(silence(0.3));
    sub('LINK','CONNECT 57600 - line is yours.');
    add(silence(0.8));
  }else{
    sub(label,'');
    add(tone(0.12,[1270],0.3));
    let wordN = 0;
    for(const ch of text){
      ct.push(t);
      add(richChar(ch, ++wordN, spd));
      add(silence(0.025/spd));
    }
    add(silence(0.2));
    add(silence(0.6));
  }
  const out = new Float32Array(Math.round(t*SR)+1);
  let p = 0;
  for(const c of chunks){ out.set(c, p); p += c.length; }
  return { f32: lineize(out), events: ev, charTimes: ct, dur: t, text: text, label: label };
}

/* ---------- spectrogram + subs ---------- */
const cv = document.getElementById('spec'), cx = cv.getContext('2d');
function fit(){
  const r = devicePixelRatio||1, w = cv.clientWidth, h = 200;
  cv.width = w*r; cv.height = h*r;
  cx.fillStyle = '#0000aa'; cx.fillRect(0,0,cv.width,cv.height);
}
fit(); addEventListener('resize', fit);

function heat(v){ // 0..255 -> NC blue -> cyan -> white
  const x = v/255;
  if(x<0.35){ const k=x/0.35; return `rgb(0,${(120*k)|0},${(170+50*k)|0})`; }
  if(x<0.75){ const k=(x-0.35)/0.4; return `rgb(${(85*k)|0},${(120+135*k)|0},${(220+35*k)|0})`; }
  const k=(x-0.75)/0.25; return `rgb(${(85+170*k)|0},255,255)`;
}

const subs = document.getElementById('subs');
const leds = {OH:ledOH, CD:ledCD, RD:ledRD, SD:ledSD};
function setLed(id,on,hot){ leds[id].className = 'led'+(on?(hot?' hot':' on'):''); }
function escp(s){ const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

function frame(){
  if(!playing) return;
  const now = actx.currentTime - playT0;

  analyser.getByteFrequencyData(freq);
  const bins = Math.round(4000/(SR/analyser.fftSize));
  const colW = Math.max(2, (devicePixelRatio||1)*2), H = cv.height;
  cx.drawImage(cv, -colW, 0);
  for(let y=0;y<H;y++){
    const bin = ((1 - y/H)*bins)|0;
    cx.fillStyle = heat(freq[bin]||0);
    cx.fillRect(cv.width-colW, y, colW, 1);
  }

  let ev = events[0];
  for(const e of events){ if(e.t<=now) ev = e; else break; }
  if(ev.txt==='' && charTimes.length){
    let i=0;
    while(i<charTimes.length && charTimes[i]<=now) i++;
    subs.innerHTML = '<span class="who">'+ev.who+':</span>'+escp(playText.slice(0,i))+'<span class="cur"></span>';
  }else{
    subs.innerHTML = '<span class="who">'+ev.who+':</span>'+escp(ev.txt);
  }

  setLed('OH', true);
  setLed('CD', connected);
  setLed('RD', playKind==='boot' && Math.sin(now*40)>0, true);
  setLed('SD', playKind==='msg' && now<totalDur-0.7 && Math.sin(now*60)>0, true);

  if(now < totalDur) requestAnimationFrame(frame);
  else{
    playing = false;
    setLed('RD',false); setLed('SD',false);
    if(playKind==='boot' && !connected){
      connected = true;
      connectedAt = Date.now();
      document.getElementById('lnk').textContent = 'ONLINE';
    }
    setLed('OH', connected); setLed('CD', connected);
    txBtn.disabled = false;
    curSrc = null;
    document.querySelectorAll('.fi.playing').forEach(el=>el.classList.remove('playing'));
    if(queue.length){ playFromQueue(); return; }   // continue a PLAY ALL run
    if(playKind==='boot') setView('none');          // dialed in -> online, terminal-only
    else if(view !== 'thread') startIdle();         // resume the idle line off-thread
    // help text and message subtitles are left on screen (Help stays readable)
  }
}

/* ---------- playback ---------- */
function play(o, kind){
  stopIdle();                 // a real transmission takes the line
  events = o.events; charTimes = o.charTimes; totalDur = o.dur; playKind = kind;
  playText = o.text || '';
  if(!o.buf){ o.buf = actx.createBuffer(1, o.f32.length, SR); o.buf.copyToChannel(o.f32, 0); }
  const src = actx.createBufferSource();
  src.buffer = o.buf;
  analyser = actx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.2;
  freq = new Uint8Array(analyser.frequencyBinCount);
  src.connect(analyser); analyser.connect(actx.destination);
  cx.fillStyle = '#0000aa'; cx.fillRect(0,0,cv.width,cv.height);
  curSrc = src;
  playT0 = actx.currentTime + 0.05;
  src.start(playT0);
  playing = true;
  txBtn.disabled = true;
  requestAnimationFrame(frame);
}

/* ---------- crypto: AES-GCM, key = PBKDF2(passphrase). Deterministic per-key
   salt so two people sharing a key derive the same key (symmetric); random IV
   per message is the "randomiser". Real crypto, but a toy - timestamps are
   public and weak keys are guessable. ---------- */
const keyCache = {};   // key string -> derived CryptoKey (enc is the global TextEncoder)
function b64(u8){ let s=''; for(let i=0;i<u8.length;i++) s += String.fromCharCode(u8[i]); return btoa(s); }
function ub64(s){ const bin=atob(s), u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u[i]=bin.charCodeAt(i); return u; }
function b64url(u8){ return b64(u8).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
async function aesKey(pass){
  if(keyCache[pass]) return keyCache[pass];
  const seed = await crypto.subtle.digest('SHA-256', enc.encode('handshake.v1:'+pass));
  const km = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
  const k = await crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:new Uint8Array(seed), iterations:120000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
  keyCache[pass] = k; return k;
}
async function encMsg(pass, text){
  const iv = crypto.getRandomValues(new Uint8Array(12)), k = await aesKey(pass);
  const ct = new Uint8Array(await crypto.subtle.encrypt({name:'AES-GCM', iv}, k, enc.encode(text)));
  const out = new Uint8Array(12+ct.length); out.set(iv,0); out.set(ct,12);
  return b64(out);
}
async function decMsg(pass, payload){
  try{
    const raw = ub64(payload), iv = raw.slice(0,12), ct = raw.slice(12), k = await aesKey(pass);
    return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM', iv}, k, ct));
  }catch(e){ return null; }   // wrong key
}
// the channel a key listens on = a public hash of the key (server never sees the key)
async function channelId(pass){
  const h = await crypto.subtle.digest('SHA-256', enc.encode('handshake.ch:'+pass));
  return b64url(new Uint8Array(h)).slice(0,24);
}
function genKey(){
  const a = crypto.getRandomValues(new Uint8Array(16)), A = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<a.length;i++){ s += A[a[i] % 32]; if(i%4===3 && i<a.length-1) s += '-'; }
  return s;   // e.g. K7F2-9XQ4-3MTL-8RVN  (~80 bits)
}

/* ---------- key-as-clip: encode the key into DTMF-style tones (codec-survivable),
   wrap as a shareable MP4, and decode it back from any uploaded clip. Validated to
   survive a WhatsApp video round-trip. ---------- */
const KB32 = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
const DROW = [697,770,852,941], DCOL = [1209,1336,1477,1633], DFREQ = [...DROW,...DCOL];
const KHDR = [15,14], KON = 0.10, KGAP = 0.06, KLEAD = 0.20;
function keyNibbles(key){
  const clean = key.toUpperCase().replace(/[^A-Z2-9]/g,''), bits = [];
  for(const ch of clean){ const v = KB32.indexOf(ch); if(v<0) continue; for(let b=4;b>=0;b--) bits.push((v>>b)&1); }
  while(bits.length % 4) bits.push(0);
  const n = []; for(let i=0;i<bits.length;i+=4) n.push((bits[i]<<3)|(bits[i+1]<<2)|(bits[i+2]<<1)|bits[i+3]);
  return n;
}
function nibblesKey(n){
  const bits = []; for(const v of n){ for(let b=3;b>=0;b--) bits.push((v>>b)&1); }
  let s=''; for(let i=0;i+5<=bits.length;i+=5){ let v=0; for(let j=0;j<5;j++) v=(v<<1)|bits[i+j]; s += KB32[v]; }
  return s.replace(/(.{4})/g,'$1-').replace(/-$/,'');
}
function nibBytes(n){ const b=[]; for(let i=0;i<n.length;i+=2) b.push((n[i]<<4)|(n[i+1]||0)); return b; }
function crc8(by){ let c=0; for(const b of by){ c^=b; for(let i=0;i<8;i++) c=(c&0x80)?((c<<1)^0x07)&0xff:(c<<1)&0xff; } return c; }
function keyFrame(key){ const p=keyNibbles(key), c=crc8(nibBytes(p)); return [...KHDR,...p,(c>>4)&15,c&15]; }
function keyToneBuf(key){   // Float32 of clean DTMF tones (no lineize - keep it decodable)
  const parts=[silence(KLEAD)];
  for(const idx of keyFrame(key)){ parts.push(tone(KON, [DROW[(idx>>2)&3], DCOL[idx&3]], 0.5)); parts.push(silence(KGAP)); }
  parts.push(silence(0.2));
  let len=0; for(const p of parts) len+=p.length;
  const o=new Float32Array(len); let off=0; for(const p of parts){ o.set(p,off); off+=p.length; }
  return o;
}
function goertzel(x,start,N,f,sr){ const k=Math.round(N*f/sr), w=2*Math.PI*k/N, cw=2*Math.cos(w); let s1=0,s2=0;
  for(let i=0;i<N;i++){ const s0=x[start+i]+cw*s1-s2; s2=s1; s1=s0; } return s1*s1+s2*s2-cw*s1*s2; }
function top2(a){ let i1=0; for(let i=1;i<a.length;i++) if(a[i]>a[i1]) i1=i; let i2=-1;
  for(let i=0;i<a.length;i++){ if(i===i1) continue; if(i2<0||a[i]>a[i2]) i2=i; } return [i1,i2]; }
function decodeKey(x,sr){
  const N=1024, HOP=512, MINRUN=3, PEAK=3.0, FLOOR=0.10;
  const wins=[]; let maxTot=1e-9;
  for(let s=0;s+N<=x.length;s+=HOP){ const p=DFREQ.map(f=>goertzel(x,s,N,f,sr)); const t=p.reduce((a,b)=>a+b,0); if(t>maxTot) maxTot=t; wins.push({p,t}); }
  const floor=FLOOR*maxTot, seq=[];
  for(const {p,t} of wins){ if(t<floor){ seq.push(-1); continue; } const rp=p.slice(0,4), cp=p.slice(4,8);
    const [r1,r2]=top2(rp), [c1,c2]=top2(cp); seq.push((rp[r1]>PEAK*rp[r2]&&cp[c1]>PEAK*cp[c2])?(r1*4+c1):-1); }
  const syms=[]; let i=0;
  while(i<seq.length){ if(seq[i]<0){ i++; continue; } let j=i; const idx=seq[i]; while(j<seq.length&&seq[j]===idx) j++; if(j-i>=MINRUN) syms.push(idx); i=j; }
  for(let k=0;k+24<=syms.length;k++){ if(syms[k]===KHDR[0]&&syms[k+1]===KHDR[1]){
    const pay=syms.slice(k+2,k+22), crc=syms.slice(k+22,k+24), c=crc8(nibBytes(pay));
    if(crc[0]===((c>>4)&15) && crc[1]===(c&15)) return nibblesKey(pay); } }
  return null;
}
function pickMime(){
  if(!window.MediaRecorder) return null;
  for(const m of ['video/mp4;codecs=avc1.42E01E,mp4a.40.2','video/mp4','video/webm;codecs=vp8,opus','video/webm'])
    if(MediaRecorder.isTypeSupported(m)) return m;
  return null;
}
async function shareBlob(blob, name){
  const file = new File([blob], name, {type:blob.type});
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:'handshake key'}); return; }catch(e){}
  }
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),4000);
}
async function makeKeyClip(key){
  if(playing) return;
  await ensureAudio();
  const mime = pickMime();
  if(!mime){ sys('this browser cannot make a handshake clip - use COPY CODE instead.'); return; }
  const f32 = keyToneBuf(key);
  const buf = actx.createBuffer(1, f32.length, SR); buf.copyToChannel(f32,0);
  const src = actx.createBufferSource(); src.buffer = buf;
  const dest = actx.createMediaStreamDestination();
  const an = actx.createAnalyser(); an.fftSize = 2048; const fb = new Uint8Array(an.frequencyBinCount);
  src.connect(an); src.connect(dest); src.connect(actx.destination);
  cx.fillStyle = '#0000aa'; cx.fillRect(0,0,cv.width,cv.height);
  const stream = new MediaStream([cv.captureStream(30).getVideoTracks()[0], dest.stream.getAudioTracks()[0]]);
  const rec = new MediaRecorder(stream, {mimeType:mime}); const parts=[];
  rec.ondataavailable = e=>{ if(e.data.size) parts.push(e.data); };
  rec.onstop = ()=>{ const mp4 = mime.includes('mp4'); shareBlob(new Blob(parts,{type:mp4?'video/mp4':'video/webm'}), 'handshake.'+(mp4?'mp4':'webm'));
    sys('handshake ready - save it / send it to your friend.'); };
  let raf; const draw=()=>{ an.getByteFrequencyData(fb); const colW=Math.max(2,(devicePixelRatio||1)*2), H=cv.height;
    cx.drawImage(cv,-colW,0); const bins=Math.round(4000/(SR/an.fftSize));
    for(let y=0;y<H;y++){ cx.fillStyle=heat(fb[((1-y/H)*bins)|0]||0); cx.fillRect(cv.width-colW,y,colW,1);} raf=requestAnimationFrame(draw); };
  sys('rendering handshake...');
  rec.start(); src.start(); draw();
  src.onended = ()=>{ cancelAnimationFrame(raf); setTimeout(()=>rec.stop(), 120); };
}
async function openKeyClip(file){
  if(!file || playing) return;
  await ensureAudio();
  sys('reading handshake...');
  let buffer=null;
  try{ buffer = await actx.decodeAudioData(await file.arrayBuffer()); }catch(e){ buffer=null; }
  const key = buffer ? decodeKey(buffer.getChannelData(0), buffer.sampleRate) : null;
  if(!key){ sys('NO CARRIER - no handshake in that clip. try the original file, or paste the code.'); return; }
  await loadThread(key);                       // -> level 3
  const o = { f32: buffer.getChannelData(0), buf: buffer, dur: buffer.duration, text: '',
    events: [{t:0,who:'LINE',txt:'handshake accepted - connecting...'}, {t:Math.max(0,buffer.duration-0.6),who:'LINE',txt:'you are in.'}], charTimes: [] };
  play(o, 'msg');                              // replay the handshake as the "you're in" ritual
}

/* ---------- controls: terminal + on-demand views (compose / key / thread) ---------- */
const txBtn = document.getElementById('bTx'),
      secretEl = document.getElementById('secret'),
      vConnect = document.getElementById('vConnect'),
      vCompose = document.getElementById('vCompose'),
      vKey = document.getElementById('vKey'),
      vThread = document.getElementById('vThread'),
      msgIn = document.getElementById('msgIn'),
      keyIn = document.getElementById('keyIn'),
      replyIn = document.getElementById('replyIn'),
      feedEl = document.getElementById('feed'),
      clipIn = document.getElementById('clipIn'),
      playAllBtn = document.getElementById('playAll'),
      stopBtn = document.getElementById('stopAll');
function sys(t){ subs.innerHTML = '<span class="who">SYS:</span>'+escp(t); }

let activeKey = '', activeChannel = null, lastId = 0, view = 'none';
const feedCache = {};   // id -> synthesized result for replay
const feedMsgs = [];    // the current key's transmissions, in order
function hhmm(t){ const d=new Date(t); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }

/* names + read-state. The name rides INSIDE the ciphertext, so the relay still
   sees nothing - only key holders can see who said what. */
const handleIn = document.getElementById('handleIn');
function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }
const HANDLES = ['NEON','ACID','TURBO','CYBER','RETRO','VAPOR','GHOST','MODEM','PIXEL','GLITCH','STATIC','CARRIER'];
function randHandle(){ return HANDLES[(Math.random()*HANDLES.length)|0] + ((Math.random()*90+10)|0); }
let myHandle = (lsGet('hs_handle') || randHandle()).slice(0,16);
lsSet('hs_handle', myHandle);
const HCOLORS = ['#55ffff','#ffff55','#55ff55','#ff66cc','#ffaa55','#66aaff','#aa88ff','#ff7777'];
function handleColor(h){ let n=0; for(let i=0;i<h.length;i++) n=(n*31+h.charCodeAt(i))>>>0; return HCOLORS[n%HCOLORS.length]; }
function packMsg(text){ return JSON.stringify({h:myHandle, m:text}); }
function unpackMsg(plain){
  try{ const o=JSON.parse(plain); if(o && typeof o.m==='string') return {who:(o.h||'').slice(0,16), text:o.m}; }catch(e){}
  return {who:'', text:plain};   // legacy / plain
}
let readSet = new Set(), threadLoaded = false;
function loadRead(){ try{ readSet = new Set(JSON.parse(lsGet('hs_read:'+activeChannel)||'[]')); }catch(e){ readSet = new Set(); } }
function markRead(id){ if(readSet.has(id)) return; readSet.add(id); lsSet('hs_read:'+activeChannel, JSON.stringify([...readSet].slice(-800))); }
function blip(){   // soft "incoming" tick for a new transmission
  if(!actx || playing) return;
  try{ const n=(0.08*SR)|0, buf=actx.createBuffer(1,n,SR), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i] = Math.sin(2*Math.PI*1300*i/SR)*0.2*Math.min(1,(n-i)/700);
    const s=actx.createBufferSource(); s.buffer=buf; s.connect(actx.destination); s.start(); }catch(e){}
}
function paintItem(m){
  const mine = m.who && m.who===myHandle;
  const who = m.who
    ? '<span class="ch'+(mine?' me':'')+'"'+(mine?'':' style="color:'+handleColor(m.who)+'"')+'>'+escp(mine?'you':m.who)+'</span>'
    : '';
  m.el.innerHTML = '<span class="ct">['+hhmm(m.t)+']</span>'+who+'<span class="pl">► PLAY</span><span class="nd">NEW</span>';
}

function setView(v){
  view = connected ? v : 'connect';     // CONNECT is the gate - the first step
  secretEl.hidden = view==='none';
  vConnect.hidden = view!=='connect';
  vCompose.hidden = view!=='compose';
  vKey.hidden     = view!=='keyentry';
  vThread.hidden  = view!=='thread';
  if(view==='thread') stopIdle(); else startIdle();   // terminal is "alive" off-thread
}

/* ---------- idle line: synthetic carrier + line noise at the menu.
   Purely decorative - no real channel, never leaks or pulls old messages. ---------- */
let idleOn=false, idleRAF=0, idleSrc=null, idleGain=null, idleBuf=null, idleT=0;
function menuLine(){ subs.innerHTML = '<span class="who">LINE:</span>on the line - TRANSMIT a secret, or OPEN a handshake to listen.'; }
function idleColumn(){
  const H = cv.height, colW = Math.max(2,(devicePixelRatio||1)*2);
  cx.drawImage(cv, -colW, 0);
  idleT += 1/60;
  const carrier = 0.28 + 0.10*Math.sin(idleT*0.6) + 0.03*Math.sin(idleT*3.7);
  const sig = Math.sin(idleT*0.23) > 0.95, sigBand = 0.55 + 0.2*Math.sin(idleT*1.3);
  for(let y=0;y<H;y++){
    const fr = 1 - y/H;
    let v = 14 + Math.random()*16;                                  // noise floor
    if(Math.abs(fr-carrier) < 0.015) v += 90 + 60*Math.sin(idleT*5);// idle carrier line
    if(sig && Math.abs(fr-sigBand) < 0.05) v += 120*Math.random();  // distant signal
    cx.fillStyle = heat(Math.max(0, Math.min(255, v)));
    cx.fillRect(cv.width-colW, y, colW, 1);
  }
}
function idleFrame(){
  if(!idleOn || playing){ idleRAF = 0; return; }
  idleColumn();
  idleRAF = requestAnimationFrame(idleFrame);
}
function makeIdleBuffer(){
  const dur=4, n=Math.round(dur*SR), a=new Float32Array(n);
  let p=0, ph=0, ph50=0;
  for(let i=0;i<n;i++){
    p = (Math.random()*2-1 + p*1.7)/2.7;
    ph += 2*Math.PI*(2100 + 40*Math.sin(i/SR*0.6))/SR;
    ph50 += 2*Math.PI*50/SR;
    a[i] = p*0.5 + Math.sin(ph)*0.05 + Math.sin(ph50)*0.02;
  }
  lineize(a);
  const buf = actx.createBuffer(1, n, SR); buf.copyToChannel(a, 0); return buf;
}
function idleSound(){   // start the ambient loop once audio is available
  if(!actx || idleSrc || !idleOn) return;
  if(!idleBuf) idleBuf = makeIdleBuffer();
  idleGain = actx.createGain(); idleGain.gain.value = 0;
  idleSrc = actx.createBufferSource(); idleSrc.buffer = idleBuf; idleSrc.loop = true;
  idleSrc.connect(idleGain); idleGain.connect(actx.destination);
  idleSrc.start();
  idleGain.gain.linearRampToValueAtTime(0.05, actx.currentTime + 0.8);
}
function startIdle(){
  if(idleOn) return; idleOn = true;
  if(!idleRAF) idleRAF = requestAnimationFrame(idleFrame);
  idleSound();
}
function stopIdle(){
  if(!idleOn && !idleSrc) return;
  idleOn = false;
  if(idleRAF){ cancelAnimationFrame(idleRAF); idleRAF = 0; }
  if(idleSrc){
    const s = idleSrc;
    try{ idleGain.gain.linearRampToValueAtTime(0, actx.currentTime + 0.25); }catch(e){}
    setTimeout(()=>{ try{ s.stop(); }catch(e){} }, 300);
    idleSrc = null; idleGain = null;
  }
}
async function ensureAudio(){
  if(!actx) actx = new (window.AudioContext||window.webkitAudioContext)({sampleRate:SR});
  await actx.resume();
  idleSound();   // first gesture: bring the idle line's ambient up
}
function stopPlayback(){
  queue = [];
  if(curSrc){ try{ curSrc.stop(); }catch(e){} curSrc = null; }
  playing = false;
  setLed('RD',false); setLed('SD',false);
  setLed('OH', connected); setLed('CD', connected);
  txBtn.disabled = false;
  document.querySelectorAll('.fi.playing').forEach(el=>el.classList.remove('playing'));
}

async function playOne(m, btn){
  if(playing) return;
  await ensureAudio();
  if(!feedCache[m.id]) feedCache[m.id] = synth('msg', m.plain, 1, (m.who||'RX'));
  document.querySelectorAll('.fi.playing').forEach(el=>el.classList.remove('playing'));
  if(btn){ btn.classList.add('playing'); btn.classList.remove('flash'); btn.scrollIntoView({block:'nearest'}); }
  if(!readSet.has(m.id)){ markRead(m.id); if(m.el) m.el.classList.add('read'); }   // playing it = read
  play(feedCache[m.id], 'msg');
}
function playFromQueue(){            // continues a PLAY ALL run (called from frame())
  if(!queue.length) return;
  const m = queue.shift();
  playOne(m, m.el);
}
function playSequence(msgs){
  if(playing || !msgs.length) return;
  queue = msgs.slice(1);
  playOne(msgs[0], msgs[0].el);
}

async function addItem(m, live){
  if(!m || m.id<=lastId) return;
  lastId = m.id;
  const plain = await decMsg(activeKey, m.enc);
  if(plain == null) return;          // not for this key - skip
  const u = unpackMsg(plain); m.who = u.who; m.plain = u.text;
  const mine = m.who && m.who===myHandle;
  if(mine) markRead(m.id);           // your own messages aren't "new"
  feedMsgs.push(m);
  const ph = feedEl.querySelector('.csys'); if(ph) ph.remove();
  const atBottom = feedEl.scrollHeight - feedEl.scrollTop - feedEl.clientHeight < 40;
  const b = document.createElement('button');
  b.className = 'fi'; b.type = 'button'; m.el = b;
  if(readSet.has(m.id)) b.classList.add('read');
  paintItem(m);
  b.addEventListener('click', ()=>{ stopPlayback(); playOne(m, b); });
  feedEl.appendChild(b);
  if(live && !mine){                 // a fresh transmission from someone else
    b.classList.add('flash'); blip();
    if(!playing) sys('new transmission'+(m.who?(' from '+m.who):'')+' - PLAY to hear.');
  }
  if(atBottom || (live && !mine)) feedEl.scrollTop = feedEl.scrollHeight;
}
async function pollThread(){
  if(!activeChannel) return;
  try{
    const r = await fetch('/api/messages?channel='+encodeURIComponent(activeChannel)+'&since='+lastId, {cache:'no-store'});
    if(!r.ok) throw 0;
    const j = await r.json();
    const live = threadLoaded;       // first load isn't "live" (no flash/blip on history)
    for(const m of (j.messages||[])) await addItem(m, live);
    threadLoaded = true;
    if(!feedMsgs.length) feedEl.innerHTML = '<div class="csys">no transmissions on this key yet - TRANSMIT one.</div>';
  }catch(e){
    if(!feedMsgs.length) feedEl.innerHTML = '<div class="csys">BOARD OFFLINE - needs the deployed /api + KV store.</div>';
  }
}
async function loadThread(key){     // -> thread view
  stopPlayback();
  activeKey = (key||'').trim();
  feedMsgs.length = 0; lastId = 0; threadLoaded = false;
  if(!activeKey){ activeChannel = null; setView('none'); return; }
  connected = true; document.getElementById('lnk').textContent = 'ONLINE';
  if(!connectedAt) connectedAt = Date.now();
  handleIn.value = myHandle;
  feedEl.innerHTML = '<div class="csys">tuning in...</div>';
  setView('thread');
  activeChannel = await channelId(activeKey);
  loadRead();                        // restore which messages you've already played
  pollThread();
}

async function connect(){           // the first step: dial in
  if(playing || connected) return;
  await ensureAudio();
  if(!boot) boot = synth('boot','',1);
  play(boot, 'boot');
}
/* bottom-menu actions: connect must come first; then each reveals its field on demand */
async function showCompose(){       // TRANSMIT
  if(!connected){ connect(); return; }
  await ensureAudio();
  setView('compose'); msgIn.focus();
}
async function showKey(){           // KEY (paste a handshake code)

  await ensureAudio();
  setView('keyentry'); keyIn.focus();
}
function openHandshake(){ if(!connected){ connect(); return; } clipIn.click(); }   // HANDSHAKE
function doQuit(){                  // back to the clean terminal-only main screen
  stopPlayback();
  activeKey = ''; activeChannel = null; feedMsgs.length = 0; lastId = 0;
  msgIn.value = ''; keyIn.value = ''; replyIn.value = '';
  const a = document.activeElement; if(a && a.blur) a.blur();   // drop the keyboard

async function sendUnder(key, text){
  play(synth('msg', text, 1), 'msg');   // hear your own plaintext
  try{
    const r = await fetch('/api/messages', {method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ channel: await channelId(key), enc: await encMsg(key, packMsg(text)) })});
    if(r.ok) pollThread();
  }catch(e){}
}
async function doTransmitNew(){      // compose -> new keyed thread
  if(playing) return;
  await ensureAudio();
  const text = msgIn.value.trim();
  if(!text){ msgIn.focus(); return; }
  const key = genKey();
  await loadThread(key);
  msgIn.value = '';
  sendUnder(key, text);
  sys('handshake minted - SAVE HANDSHAKE to share it (or COPY CODE).');
}
async function doListen(){           // key entry -> tune in
  if(playing) return;
  await ensureAudio();
  const key = keyIn.value.trim();
  if(!key){ keyIn.focus(); return; }
  await loadThread(key);
}
async function doReply(){            // thread: keep transmitting under the same key
  if(playing || !activeKey) return;
  await ensureAudio();
  const text = replyIn.value.trim();
  if(!text){ replyIn.focus(); return; }
  replyIn.value = '';
  sendUnder(activeKey, text);
}
async function doRefresh(){            // thread: check the line for new transmissions, no reload
  if(!activeChannel || playing) return;
  const n0 = feedMsgs.length;
  sys('checking the line...');
  await pollThread();
  const d = feedMsgs.length - n0;
  sys(d>0 ? (d+' new transmission'+(d>1?'s':'')+' - PLAY ALL to hear.') : 'up to date - no new transmissions.');
}
async function doCopy(){               // recovery hatch: the handshake code in text, never shown otherwise
  if(!activeKey) return;
  try{ await navigator.clipboard.writeText(activeKey); sys('handshake code copied - a text backup if the clip fails.'); }
  catch(e){ sys('CODE: '+activeKey); }
}

stopBtn.addEventListener('click', stopPlayback);
document.getElementById('refreshBtn').addEventListener('click', doRefresh);
handleIn.addEventListener('input', ()=>{ myHandle = (handleIn.value.trim()||'ANON').slice(0,16); lsSet('hs_handle', myHandle); });
msgIn.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); doTransmitNew(); } });
replyIn.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); doReply(); } });
keyIn.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); doListen(); } });

connectBtn.addEventListener('click', connect);

/* bottom menu: Transmit / Handshake / Key / Quit (reveal fields on demand) */
function actTransmit(){ if(view==='thread') doReply(); else showCompose(); }
txBtn.addEventListener('click', actTransmit);
document.getElementById('bHand').addEventListener('click', openHandshake);
document.getElementById('bKey').addEventListener('click', showKey);
document.getElementById('bQuit').addEventListener('click', doQuit);

/* top menu: Help only - the text stays on screen after it plays */
document.getElementById('mHelp').addEventListener('click', async ()=>{
  if(playing) return; await ensureAudio();
  if(!help) help = synth('msg', 'connect to dial in. transmit a secret - it leaves encrypted and you get a handshake, a clip of sound that is the key. send it to a friend; they connect, open it, and tune in - the secret plays and reads off the screen. no handshake, no message.', 1, 'HELP');
  play(help, 'help');
});

addEventListener('keydown', e=>{
  if(e.target.tagName === 'INPUT') return;
  const k = e.key;
  if(k==='F1'||k==='1'){ e.preventDefault(); actTransmit(); }
  if(k==='F2'||k==='2'){ e.preventDefault(); openHandshake(); }
  if(k==='F3'||k==='3'){ e.preventDefault(); showKey(); }
  if(k==='F10'){ e.preventDefault(); doQuit(); }
});

setView('none');   // boot to terminal-only; idle line runs (visual now, sound after first tap)
setInterval(()=>{ if(activeChannel && !playing) pollThread(); }, 4000);

/* clocks */
function tickClock(){
  const d = new Date();
  document.getElementById('tclk').textContent =
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}
tickClock(); setInterval(tickClock, 15000);
setInterval(()=>{
  if(!connected) return;
  const s = ((Date.now()-connectedAt)/1000)|0;
  document.getElementById('clk').textContent =
    String((s/60)|0).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}, 1000);
</script>
</body>
</html>
